name: Profile Readme Stats

on:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with WakaTime + GitHub stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # secrets aren't allowed in step-level if expressions, so expose
      # the PAT's presence through env for the gate below
      HAS_GH_TOKEN: ${{ secrets.STATS_TOKEN }}
    steps:
      # Weekly language/time breakdown as a text chart
      - name: Weekly breakdown (waka-readme)
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          # alphanumeric only — underscores make the action fall back to 'waka'
          SECTION_NAME: wakaweek
          SHOW_TITLE: true
          BLOCKS: "░▒▓█"

      # Dev metrics: code time badge, profile views, lines of code,
      # GitHub data, commit time-of-day, most productive day, etc.
      # Needs a classic PAT (repo + user scopes) saved as the STATS_TOKEN
      # secret — the built-in GITHUB_TOKEN cannot read account details.
      # Skips cleanly until that secret exists.
      - name: Dev metrics (waka-readme-stats)
        if: ${{ env.HAS_GH_TOKEN != '' }}
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
          SHOW_TOTAL_CODE_TIME: "True"
          SHOW_PROFILE_VIEWS: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_COMMIT: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE: "True"
          SHOW_EDITORS: "True"
          SHOW_PROJECTS: "True"
          SHOW_OS: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_LOC_CHART: "False"
          SHOW_UPDATED_DATE: "True"
          COMMIT_MESSAGE: "docs(readme): update profile stats"
